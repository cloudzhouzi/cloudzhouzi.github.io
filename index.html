<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Personal academic homepage with education and publications."
    />
    <title>个人主页 | Coming soon</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Back to top">Coming soon</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#education" data-i18n="nav.education">教育经历</a>
        <a href="#publications" data-i18n="nav.publications">论文</a>
      </nav>
      <div class="actions" aria-label="Site preferences">
        <button class="icon-button" id="language-toggle" type="button" aria-label="Switch language">
          <span aria-hidden="true">中/EN</span>
        </button>
        <button class="icon-button" id="theme-toggle" type="button" aria-label="Switch theme">
          <span class="theme-icon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-content">
          <p class="eyebrow" data-i18n="hero.eyebrow">个人学术主页</p>
          <h1 id="hero-title" data-i18n="hero.name">Coming soon</h1>
          <p class="subtitle" data-i18n="hero.subtitle">
            Coming soon
          </p>
        </div>
        <aside class="profile-panel" aria-label="Profile summary">
          <div class="avatar" aria-hidden="true">CS</div>
          <dl class="profile-list">
            <div>
              <dt data-i18n="profile.schoolLabel">学校</dt>
              <dd data-i18n="profile.school">Coming soon</dd>
            </div>
            <div>
              <dt data-i18n="profile.roleLabel">身份</dt>
              <dd data-i18n="profile.role">Coming soon</dd>
            </div>
            <div>
              <dt data-i18n="profile.locationLabel">地点</dt>
              <dd data-i18n="profile.location">Coming soon</dd>
            </div>
          </dl>
        </aside>
      </section>

      <section class="section" id="education" aria-labelledby="education-title">
        <div class="section-heading">
          <p class="eyebrow" data-i18n="education.eyebrow">Education</p>
          <h2 id="education-title" data-i18n="education.title">学校经历</h2>
        </div>
        <div class="coming-soon">
          <span class="status-dot" aria-hidden="true"></span>
          <p data-i18n="education.comingSoon">Coming soon</p>
        </div>
      </section>

      <section class="section publications" id="publications" aria-labelledby="publications-title">
        <div class="section-heading">
          <p class="eyebrow" data-i18n="publications.eyebrow">Publications</p>
          <h2 id="publications-title" data-i18n="publications.title">论文</h2>
        </div>
        <div class="coming-soon">
          <span class="status-dot" aria-hidden="true"></span>
          <p data-i18n="publications.comingSoon">Coming soon</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        <span data-i18n="footer.updated">最近更新</span>
        <time datetime="2026-06-01">2026.06</time>
      </p>
      <p data-i18n="footer.note">Built for GitHub Pages.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
